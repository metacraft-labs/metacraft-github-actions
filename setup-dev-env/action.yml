name: Setup Dev Environment
description: >
  Materialise the repository's already-declared deterministic dev
  environment on a CI runner. After this action, subsequent
  steps invoke `dev-exec <cmd>` to run any command inside the
  same env a developer uses locally (`nix develop -c <cmd>`, the
  Windows `. .\env.ps1; <cmd>` equivalent, or `repro exec --
  <cmd>` once reprobuild is available).

  This action is the CI-side replay of the contract documented in
  https://github.com/metacraft-labs/metacraft-dev-guidelines/blob/latest/policies/ci-shared-dev-env.md

inputs:
  env-flavor:
    description: >
      Which env flavor to materialise:
        - "nix"          → install Nix, ensure `nix develop`
                            resolves; `dev-exec` becomes
                            `nix develop --command <cmd>`.
        - "windows-diy"  → source `env.ps1` at the repo root and
                            persist the resulting environment to
                            `$GITHUB_ENV`; `dev-exec` becomes a
                            passthrough since the env is already
                            in-process for subsequent steps.
        - "reprobuild"   → install the `repro` CLI, run
                            `repro build` to materialise the
                            cached env; `dev-exec` becomes
                            `repro exec -- <cmd>`.
    required: true
  gh-token:
    description: >
      GitHub token used to authenticate Nix flake input fetches
      and (where applicable) the Cachix substituter. Required
      for `env-flavor: nix` because nix inputs reach private
      Metacraft Labs repos.
    required: false
    default: ""
  cachix-cache:
    description: >
      Cachix cache name to enable as a substituter (nix flavor
      only). Leave empty to skip Cachix.
    required: false
    default: ""
  cachix-auth-token:
    description: >
      Cachix auth token for the named cache. Required if
      `cachix-cache` is set and the cache is private.
    required: false
    default: ""
  flake-override-inputs:
    description: >
      Newline-separated `INPUT_NAME=PATH` entries. Each is
      translated to `--override-input INPUT_NAME path:PATH` and
      prepended to every `nix develop` invocation made by
      `dev-exec`. Use this for sibling-repo overrides cloned
      adjacent to the host repo (e.g.
      `codetracer-trace-format=../codetracer-trace-format`).
    required: false
    default: ""
  env-ps1-path:
    description: >
      Path to the Windows DIY env script (windows-diy flavor
      only). Defaults to `./env.ps1` at the calling workflow's
      working directory.
    required: false
    default: "./env.ps1"
  repro-build-pin:
    description: >
      Git ref (branch, tag, or SHA) of `metacraft-labs/reprobuild`
      to build the `repro` CLI from (reprobuild flavor only).
      Defaults to `dev`, the branch reprobuild's own CI gates on.
      Set to a SHA for fully reproducible runs.
    required: false
    default: "dev"
  nix-attr:
    description: >
      Optional flake attribute selector for the nix flavor. When
      unset, `dev-exec` calls `nix develop --command <cmd>` and
      gets the default devShell. When set to e.g. `ci`, the
      wrapper calls `nix develop .#ci --command <cmd>` and gets
      the named devShell. Use this to opt into a slim CI shell
      (`devShells.ci`) instead of the full developer shell when
      the latter pulls in dev-only tooling (AI agents, LSPs,
      AppImage tooling, etc.) that bloats the CI build closure.
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Validate env-flavor
      shell: bash
      run: |
        case "${{ inputs.env-flavor }}" in
          nix|windows-diy|reprobuild) ;;
          *)
            echo "::error::env-flavor must be one of: nix, windows-diy, reprobuild (got '${{ inputs.env-flavor }}')" >&2
            exit 1
            ;;
        esac

    # ------------------------------------------------------------------
    # env-flavor: nix
    # ------------------------------------------------------------------

    - name: Setup Nix
      if: ${{ inputs.env-flavor == 'nix' }}
      uses: metacraft-labs/metacraft-github-actions/setup-nix@main
      with:
        gh-token: ${{ inputs.gh-token }}
        cachix-cache: ${{ inputs.cachix-cache }}
        cachix-auth-token: ${{ inputs.cachix-auth-token }}

    - name: Install dev-exec wrapper (nix)
      if: ${{ inputs.env-flavor == 'nix' }}
      shell: bash
      env:
        FLAKE_OVERRIDE_INPUTS: ${{ inputs.flake-override-inputs }}
        NIX_ATTR: ${{ inputs.nix-attr }}
      run: |
        set -euo pipefail

        # Translate flake-override-inputs into nix CLI flags.
        OVERRIDE_FLAGS=""
        if [ -n "$FLAKE_OVERRIDE_INPUTS" ]; then
          while IFS= read -r entry; do
            [ -z "$entry" ] && continue
            name="${entry%%=*}"
            path="${entry#*=}"
            OVERRIDE_FLAGS="$OVERRIDE_FLAGS --override-input $name path:$path"
          done <<< "$FLAKE_OVERRIDE_INPUTS"
        fi

        # When nix-attr is set, materialise the named devShell instead
        # of the default. `nix develop .#<attr>` reads the attribute
        # from devShells.<system>.<attr>.
        ATTR_FLAG=""
        if [ -n "$NIX_ATTR" ]; then
          ATTR_FLAG=" .#$NIX_ATTR"
        fi

        mkdir -p "$HOME/.local/bin"
        cat > "$HOME/.local/bin/dev-exec" <<EOF
        #!/usr/bin/env bash
        # dev-exec (nix flavor): re-play the local dev env's
        # invocation contract.  This is the CI-side equivalent of
        # 'nix develop --command <cmd>' that a developer runs
        # locally.  Override flags below come from the
        # 'flake-override-inputs' input of setup-dev-env. The
        # attribute selector (if any) comes from 'nix-attr'.
        set -euo pipefail
        exec nix develop$OVERRIDE_FLAGS$ATTR_FLAG --command "\$@"
        EOF
        chmod +x "$HOME/.local/bin/dev-exec"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

        echo "::group::dev-exec wrapper (nix)"
        cat "$HOME/.local/bin/dev-exec"
        echo "::endgroup::"

    # ------------------------------------------------------------------
    # env-flavor: windows-diy
    # ------------------------------------------------------------------

    - name: Source env.ps1 + persist env (windows-diy)
      if: ${{ inputs.env-flavor == 'windows-diy' }}
      shell: pwsh
      env:
        ENV_PS1_PATH: ${{ inputs.env-ps1-path }}
      run: |
        # Source the project's env.ps1 in a fresh PowerShell so we
        # can capture the env-var delta and persist it to
        # GITHUB_ENV / GITHUB_PATH for subsequent steps.  This is
        # the Windows analog of `nix develop`: the env script is
        # the deterministic env declaration the developer uses
        # locally.
        if (-not (Test-Path $env:ENV_PS1_PATH)) {
          Write-Host "::error::env.ps1 not found at $env:ENV_PS1_PATH"
          exit 1
        }

        # Snapshot env BEFORE sourcing.
        $before = @{}
        Get-ChildItem env: | ForEach-Object { $before[$_.Name] = $_.Value }

        # Source the env script in this shell.
        . $env:ENV_PS1_PATH

        # Diff env vars; persist new + changed entries to GITHUB_ENV.
        Get-ChildItem env: | ForEach-Object {
          $name  = $_.Name
          $value = $_.Value
          if ((-not $before.ContainsKey($name)) -or ($before[$name] -ne $value)) {
            # PATH gets special handling: append to GITHUB_PATH
            # entry-by-entry so the actions runner aggregates
            # correctly across steps.
            if ($name -eq "PATH" -or $name -eq "Path") {
              $beforePath = if ($before.ContainsKey($name)) { $before[$name] } else { "" }
              $oldEntries = $beforePath.Split([IO.Path]::PathSeparator)
              $newEntries = $value.Split([IO.Path]::PathSeparator)
              foreach ($e in $newEntries) {
                if ($e -and ($oldEntries -notcontains $e)) {
                  Add-Content -Path $env:GITHUB_PATH -Value $e
                }
              }
            } else {
              # Escape multi-line values via heredoc syntax.
              if ($value -match "`n") {
                $eof = "EOF_$(Get-Random)"
                Add-Content -Path $env:GITHUB_ENV -Value "$name<<$eof"
                Add-Content -Path $env:GITHUB_ENV -Value $value
                Add-Content -Path $env:GITHUB_ENV -Value $eof
              } else {
                Add-Content -Path $env:GITHUB_ENV -Value "$name=$value"
              }
            }
          }
        }

    - name: Install dev-exec wrapper (windows-diy)
      if: ${{ inputs.env-flavor == 'windows-diy' }}
      shell: pwsh
      run: |
        # On Windows the env from env.ps1 is already in
        # $GITHUB_ENV / $GITHUB_PATH thanks to the previous step,
        # so subsequent steps inherit it.  `dev-exec` is a
        # passthrough that invokes the command via Git Bash for
        # parity with the nix path's bash-c invocation.
        $binDir = "$env:USERPROFILE\.local\bin"
        New-Item -ItemType Directory -Force -Path $binDir | Out-Null

        @'
        #!/usr/bin/env bash
        # dev-exec (windows-diy flavor): the env is already
        # in-process for this step thanks to setup-dev-env
        # persisting env.ps1's delta to GITHUB_ENV.  Just exec
        # the requested command.
        set -euo pipefail
        exec "$@"
        '@ | Out-File -Encoding ascii -FilePath "$binDir\dev-exec"

        # Git Bash on the runner looks at PATH; ensure the wrapper
        # is reachable for bash-shelled steps.
        Add-Content -Path $env:GITHUB_PATH -Value $binDir

    # ------------------------------------------------------------------
    # env-flavor: reprobuild
    # ------------------------------------------------------------------

    # ------------------------------------------------------------------
    # env-flavor: reprobuild
    #
    # Build the `repro` CLI from source on the runner.  We deliberately
    # do this rather than fetch a pre-built binary because:
    #
    #   * reprobuild's own release pipeline is still in flight, so
    #     pinned binaries aren't published yet.
    #
    #   * Building from source on the runner is the deterministic
    #     contract — it's what a developer does on their workstation
    #     before `repro exec` is available.  Faster CIs can substitute
    #     a cached binary once that pipeline lands.
    #
    # The build itself reuses the dev env the runner already knows how
    # to materialise: Linux/macOS via the reprobuild repo's nix flake;
    # Windows via reprobuild's own `env.ps1` DIY toolchain.  Both
    # paths drop a `repro` (or `repro.exe`) at a known location which
    # we then prepend to PATH.
    # ------------------------------------------------------------------

    - name: Clone reprobuild sibling (reprobuild)
      if: ${{ inputs.env-flavor == 'reprobuild' }}
      shell: bash
      run: |
        # Reprobuild's CI matrix builds `repro` on every push, so the
        # default-branch tip is always a known-good source tree.  We
        # honour an optional pin from the calling workflow's env so
        # repos can lock reprobuild to a known SHA across CI runs.
        REF="${REPRO_BUILD_PIN:-dev}"
        DEST="${GITHUB_WORKSPACE}/.reprobuild-src"
        rm -rf "${DEST}"
        if ! git clone --depth 1 --branch "${REF}" --single-branch \
          "https://github.com/metacraft-labs/reprobuild.git" "${DEST}" 2>/dev/null; then
          rm -rf "${DEST}"
          git clone --no-checkout "https://github.com/metacraft-labs/reprobuild.git" "${DEST}"
          git -C "${DEST}" checkout "${REF}"
        fi
      env:
        REPRO_BUILD_PIN: ${{ inputs.repro-build-pin }}

    - name: Clone reprobuild flake-input siblings (reprobuild, Linux/macOS)
      # Reprobuild's flake.nix references private metacraft-labs repos
      # (codetracer-native-recorder, runquota) as flake inputs.  The
      # default `secrets.GITHUB_TOKEN` is scoped to the calling repo and
      # cannot read sibling private repos via the tarball URL, so we
      # clone them adjacent to `.reprobuild-src` and override the flake
      # inputs to point at the local paths.  Auth uses the runner-scoped
      # token by prefixing the URL — works for both public and private
      # metacraft-labs repos since the runner is itself a
      # metacraft-labs-authenticated context.
      if: ${{ inputs.env-flavor == 'reprobuild' && runner.os != 'Windows' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        set -euo pipefail
        WS="${GITHUB_WORKSPACE}"
        for entry in \
          "codetracer-native-recorder:stable" \
          "runquota:main" \
        ; do
          name="${entry%%:*}"
          ref="${entry##*:}"
          dest="${WS}/${name}"
          rm -rf "${dest}"
          git clone --depth 1 --branch "${ref}" --single-branch \
            "https://x-access-token:${GH_TOKEN}@github.com/metacraft-labs/${name}.git" \
            "${dest}"
        done

    - name: Build repro CLI (reprobuild, Linux/macOS)
      if: ${{ inputs.env-flavor == 'reprobuild' && runner.os != 'Windows' }}
      uses: metacraft-labs/metacraft-github-actions/setup-nix@main
      with:
        gh-token: ${{ inputs.gh-token }}

    - name: nix-build repro (reprobuild, Linux/macOS)
      if: ${{ inputs.env-flavor == 'reprobuild' && runner.os != 'Windows' }}
      shell: bash
      run: |
        set -euo pipefail
        cd "${GITHUB_WORKSPACE}/.reprobuild-src"
        # Use the dev shell's just target — same path reprobuild's own
        # CI exercises, so any green CI on reprobuild's `dev` branch
        # implies a working build here.  Override the private flake
        # inputs to the local clones so Nix doesn't try to fetch them
        # via tarball (which 404s under the calling repo's token).
        nix develop \
          --override-input codetracer-native-recorder "path:${GITHUB_WORKSPACE}/codetracer-native-recorder" \
          --override-input runquota-src "path:${GITHUB_WORKSPACE}/runquota" \
          --command bash -c '
            set -euo pipefail
            just build
            : "${NIMCRYPTO_SRC:?reprobuild dev shell did not set NIMCRYPTO_SRC}"
            : "${GITHUB_ENV:?GitHub Actions did not set GITHUB_ENV}"
            echo "NIMCRYPTO_SRC=${NIMCRYPTO_SRC}" >> "${GITHUB_ENV}"
          '
        # `just build` writes to ./build/bin/repro.  Surface it on PATH
        # for subsequent steps via GITHUB_PATH.
        echo "${PWD}/build/bin" >> "$GITHUB_PATH"

    - name: Clone reprobuild env.ps1 sibling deps (reprobuild, Windows)
      # The Windows-side reprobuild env.ps1 dot-sources
      # ../repo-workspaces/env.ps1 (toolchain bootstrap) and reads four
      # other sibling repos for source-only Nim deps:
      #   - repo-workspaces      (required: nim/gcc/just/python/gpg)
      #   - codetracer           (nim-stew/nim-faststreams/nim-serialization/nimcrypto submodules)
      #   - runquota             (runquota_* Nim libs)
      #   - nim-stackable-hooks  (monitor-shim primitives)
      # These must be siblings of `.reprobuild-src`, i.e. under
      # $GITHUB_WORKSPACE.
      if: ${{ inputs.env-flavor == 'reprobuild' && runner.os == 'Windows' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        set -euo pipefail
        WS="${GITHUB_WORKSPACE}"
        clone_repo() {
          local name="$1"
          local ref="$2"
          local dest="${WS}/${name}"
          local submodule_flags="${3:-}"

          rm -rf "${dest}"
          if ! git clone --depth 1 --branch "${ref}" --single-branch ${submodule_flags} \
            "https://x-access-token:${GH_TOKEN}@github.com/metacraft-labs/${name}.git" \
            "${dest}"; then
            rm -rf "${dest}"
            git clone --depth 1 ${submodule_flags} \
              "https://x-access-token:${GH_TOKEN}@github.com/metacraft-labs/${name}.git" \
              "${dest}"
          fi
        }

        for entry in \
          "repo-workspaces:main" \
          "runquota:main" \
          "nim-stackable-hooks:main" \
        ; do
          name="${entry%%:*}"
          ref="${entry##*:}"
          clone_repo "${name}" "${ref}" "--recurse-submodules"
        done

        clone_repo "codetracer" "main"
        git -C "${WS}/codetracer" config \
          url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf \
          "https://github.com/"
        git -C "${WS}/codetracer" submodule update --init --depth 1 --recursive -- \
          libs/nim-serialization \
          libs/nim-faststreams \
          libs/nim-stew \
          libs/nimcrypto

        # Move reprobuild from .reprobuild-src to a sibling location so
        # env.ps1 finds repo-workspaces et al. at ../<name>.
        if [ -d "${WS}/.reprobuild-src" ] && [ ! -d "${WS}/reprobuild" ]; then
          mv "${WS}/.reprobuild-src" "${WS}/reprobuild"
        fi

    - name: Build repro CLI (reprobuild, Windows)
      if: ${{ inputs.env-flavor == 'reprobuild' && runner.os == 'Windows' }}
      shell: pwsh
      run: |
        # Windows-side: replay reprobuild's own DIY contract.  Source
        # its env.ps1 (which pulls in scoop/winget toolchain managed
        # by `non-nix-build/windows/ensure-*.ps1` scripts) and run
        # `just build`.  The build drops `repro.exe` under
        # `build\bin\` which we add to GITHUB_PATH.
        Set-Location "$env:GITHUB_WORKSPACE\reprobuild"
        . .\env.ps1
        just build
        Add-Content -Path $env:GITHUB_PATH -Value (Resolve-Path .\build\bin).Path

    - name: Install dev-exec wrapper (reprobuild)
      if: ${{ inputs.env-flavor == 'reprobuild' }}
      shell: bash
      run: |
        set -euo pipefail
        # dev-exec is the policy-mandated indirection so calling
        # workflows don't bake in `repro exec --` syntax.  Per the
        # `ci-shared-dev-env` policy table:
        #
        #   reprobuild → `repro exec -- <cmd>`
        #
        # Calling steps invoke `dev-exec just test` etc. and we route
        # it through `repro exec --` against the calling repo's
        # `repro.nim` recipe (selector inferred from the working
        # directory).
        BIN_DIR="$HOME/.local/bin"
        mkdir -p "$BIN_DIR"
        cat > "$BIN_DIR/dev-exec" <<'EOF'
        #!/usr/bin/env bash
        # dev-exec (reprobuild flavor): re-play the local dev env's
        # invocation contract.  This is the CI-side equivalent of
        # `repro exec -- <cmd>` that a developer runs locally.
        set -euo pipefail
        exec repro exec -- "$@"
        EOF
        chmod +x "$BIN_DIR/dev-exec"
        echo "$BIN_DIR" >> "$GITHUB_PATH"

        # Windows runners run pwsh by default; expose the wrapper there
        # too so subsequent pwsh-shelled steps can call `dev-exec`.
        if [ "${RUNNER_OS:-}" = "Windows" ]; then
          # Translate the Unix-style script to a .cmd shim that pwsh
          # picks up first when bash isn't on PATH for a given step.
          WIN_BIN_DIR="$(cygpath -u "$USERPROFILE")/.local/bin"
          mkdir -p "$WIN_BIN_DIR"
          cat > "$WIN_BIN_DIR/dev-exec.cmd" <<'EOF'
        @echo off
        repro exec -- %*
        EOF
          echo "$WIN_BIN_DIR" >> "$GITHUB_PATH"
        fi

        echo "::group::dev-exec wrapper (reprobuild)"
        cat "$BIN_DIR/dev-exec"
        echo "::endgroup::"
